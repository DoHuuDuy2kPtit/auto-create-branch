name: Create Branch on Issue Labeled

on:
  issues:
    types: [labeled]

jobs:
  create_branch:
    # Workflow này sẽ chỉ chạy khi nhãn (label) được gán là 'coding'
    if: github.event.label.name == 'coding'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create and Push Branch
        run: |
          # 1. Lấy số thứ tự của issue (ID) và tiêu đề từ dữ liệu của GitHub gửi về
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          
          # 2. Làm sạch tiêu đề để làm tên branch chuẩn chỉnh:
          # - iconv: Loại bỏ dấu tiếng Việt (nếu có) sang dạng không dấu
          # - tr: Chuyển toàn bộ chữ hoa thành chữ thường (Khắc phục lỗi strtolower cũ)
          # - sed lần 1: Thay thế tất cả khoảng trắng và ký tự đặc biệt thành dấu gạch ngang (-)
          # - sed lần 2: Xóa các dấu gạch ngang thừa ở đầu hoặc cuối chuỗi
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | iconv -t ascii//TRANSLIT | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-zA-Z0-9]+/-/g' | sed -E 's/^-+|-+$//g')
          
          # 3. Định dạng tên branch theo cấu trúc: issue-[ID]-[tiêu-đề-slug]
          BRANCH_NAME="issue-${ISSUE_NUMBER}-${CLEAN_TITLE}"
          
          # 4. Giới hạn độ dài tên branch tối đa 50 ký tự để tránh lỗi nếu tiêu đề issue quá dài
          BRANCH_NAME=$(echo "$BRANCH_NAME" | cut -c 1-50)
          
          echo "Tiến trình: Đang tạo branch tự động với tên: $BRANCH_NAME"
          
          # 5. Cấu hình Git ẩn danh của GitHub Actions để có quyền commit/push
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 6. Tạo branch mới từ branch mặc định hiện tại và đẩy (push) lên GitHub
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
